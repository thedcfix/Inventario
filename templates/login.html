{% extends "base.html" %}
{% block title %}Login — Inventario{% endblock %}

{% block content %}
<div class="login-wrapper">
    <div class="login-card">
        <!-- Header -->
        <div class="login-header text-center">
            <div class="login-icon">
                <i class="bi bi-box-seam-fill"></i>
            </div>
            <h1 class="h4 fw-bold mt-3 mb-1">Inventario</h1>
            <p class="text-muted small mb-0">Accedi per gestire il tuo inventario</p>
        </div>

        <!-- Form -->
        <form method="POST" action="{{ url_for('login') }}" class="login-form">
            {% if error %}
            <div class="alert alert-danger py-2 small">
                <i class="bi bi-exclamation-triangle-fill me-1"></i>{{ error }}
            </div>
            {% endif %}
            <div class="mb-3">
                <label for="username" class="form-label">
                    <i class="bi bi-person me-1"></i>Username
                </label>
                <input type="text" class="form-control form-control-lg" id="username"
                       name="username" required autocomplete="username" autofocus
                       placeholder="Il tuo username">
            </div>
            <div class="mb-4">
                <label for="password" class="form-label">
                    <i class="bi bi-lock me-1"></i>Password
                </label>
                <div class="input-group">
                    <input type="password" class="form-control form-control-lg" id="password"
                           name="password" required autocomplete="current-password"
                           placeholder="La tua password">
                    <button class="btn btn-outline-secondary" type="button" id="togglePassword" title="Mostra password">
                        <i class="bi bi-eye"></i>
                    </button>
                </div>
            </div>
            <button type="submit" class="btn btn-primary btn-lg w-100">
                <i class="bi bi-box-arrow-in-right me-2"></i>Accedi
            </button>
        </form>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
document.getElementById('togglePassword').addEventListener('click', function () {
    const pwd = document.getElementById('password');
    const icon = this.querySelector('i');
    if (pwd.type === 'password') {
        pwd.type = 'text';
        icon.classList.replace('bi-eye', 'bi-eye-slash');
    } else {
        pwd.type = 'password';
        icon.classList.replace('bi-eye-slash', 'bi-eye');
    }
});
</script>
{% endblock %}
